              - generic [ref=e127]:
                - paragraph [ref=e128]: 当模块化架构的级联误差与信息压缩成为瓶颈，端到端范式试图以单一神经网络捅破感知、预测与规划的边界。UniAD（Unified Autonomous Driving）的出现，正是这一冲动的集中体现——它声称通过Query-based注意力机制实现特征在任务间的无损流动，将感知检测、运动预测、占据栅格预测与规划整合为单一可微分架构。这一动机本身站得住脚：传统流水线中，感知模块输出的边界框与轨迹点被逐级压缩，误差在接口处放大，而统一框架承诺让规划损失直接回传至感知特征，从而学到「为驾驶而感知」的表征。问题在于，这一声称建立在零架构图、零数学公式、零系统对比的结构性证据真空之上。输入数据明确标注该论文包含0张图、0张表、0个公式，使得Query-Key-Value映射的数学形式、多尺度特征融合权重计算、以及感知特征直接参与规划损失的梯度回传路径，全部无法验证。研究机构看机制新意，产业界看可落地性，而此处两者皆空。
                - paragraph [ref=e129]: 方法机制层面，论文声称「设计专门的注意力机制实现对周围环境的联合建模」，但未给出任何数学表达。在零公式的证据结构下，该注意力机制究竟是标准Transformer的Cross-Attention变体，还是为驾驶任务定制的Deformable Attention，抑或引入时序建模的Temporal Attention，完全无从判断。更关键的是，它未定义多任务损失的加权机制——感知、预测、规划三者的损失函数如何平衡？是否存在梯度冲突与任务竞争？未见消融实验展示去掉某一任务后整体驾驶性能的退化曲线，也未提供不同损失权重下的收敛稳定性分析。在零可视化、零数学形式化的条件下，「统一」相对于「松耦合多任务学习」的本质差异无法界定，复现边界极度模糊。
                - paragraph [ref=e130]: 关键证据的缺失直接瓦解了「统一框架」这一核心声称的可信度。没有架构图展示Query如何在感知、预测、规划模块间流动；没有性能对比表量化统一框架相对于分离式流水线在闭环驾驶指标（碰撞率、规划误差、计算延迟）上的边际增益；没有公式定义状态空间转移或信息瓶颈的理论保证。作为Stage 3核心节点，它未阐明统一框架是否替代或补充了Stage 2世界模型的预测功能——Query-based注意力是否比隐空间状态转移更适合捕捉多智能体交互？也未与Stage 4生成式模型（GAIA-1）进行横向对照：统一框架在信息流动与生成一致性上是否优于生成式架构？在零实证数据支撑下，「突破」叙事沦为孤立声称的拼接，而非可验证的技术推进。
                - paragraph [ref=e131]: 产业落地关键约束被系统性回避，导致可部署性存疑。论文未讨论Query机制带来的推理延迟与NVIDIA Orin级芯片<100ms车规实时性要求的兼容性，未分析多任务联合建模导致的显存占用激增与训练不稳定性（如任务竞争导致的梯度发散），亦未提供与ISO 26262功能安全及SOTIF预期功能安全的对齐机制（如ODD边界划定、长尾场景调试策略、感知-预测-规划任一模块失效时的故障降级路径）。在零GPU小时数、batch size限制或模型参数量表的证据结构下，「最具影响力框架」的声称缺乏工程可信度。更根本的缺陷在于单篇支撑与跨论文验证链条的断裂：节点内未见与2016年PilotNet或确定性端到端基线的消融实验，无法证明Query-based注意力带来的边际增益，跨方法、跨阶段、跨基线的系统对比完全空白。审稿人最可能追问：在零架构图、零公式、零对比的证据结构下，2023年的工作如何支撑「统一框架的突破」这一节点叙事？
