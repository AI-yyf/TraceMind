              - generic [ref=e98]:
                - paragraph [ref=e99]: 自动驾驶系统的模块化架构曾被视为工程稳健性的基石：感知模块输出边界框，预测模块推算轨迹，规划模块生成控制指令，信息在接口处被逐级压缩，误差在级联中放大。UniAD（Unified Autonomous Driving）的出现，试图以「统一框架」打破这一隔阂，将感知、预测、规划整合为单一端到端模型，通过Query-based注意力机制实现特征在任务间的无损流动。这一动机本身站得住脚：传统流水线中，感知输出的边界框与轨迹点被逐级压缩，而统一框架承诺让规划损失直接回传至感知特征，从而学到「为驾驶而感知」的表征。
                - paragraph [ref=e100]: 然而，这一声称建立在零架构图、零数学公式、零系统对比的结构性证据真空之上。输入数据明确标注UniAD包含0张图、0张表、0个公式，使得Query-Key-Value映射的数学形式、多尺度特征融合权重计算、以及感知特征直接参与规划损失的梯度回传路径，全部无法验证。更根本的缺陷在于单篇支撑与跨论文验证链条的断裂：作为Stage 3核心节点，UniAD未阐明统一框架是否替代或补充了Stage 2世界模型的预测功能——Query-based注意力是否比隐空间状态转移更适合捕捉多智能体交互？也未与Stage 4生成式模型（GAIA-1）进行横向对照：统一框架在信息流动与生成一致性上是否优于生成式架构？在零实证数据支撑下，「突破」叙事沦为孤立声称的拼接。
