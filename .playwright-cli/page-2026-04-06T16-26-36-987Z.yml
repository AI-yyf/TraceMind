                  - text: ）进行横向对照——统一框架在信息流动与生成一致性上是否优于生成式架构？亦未见与2016年PilotNet或确定性端到端基线的消融实验，无法证明Query-based注意力带来的边际增益。2026年虽出现DynFlowDrive（68图5表3公式）与UniDriveDreamer（57图3表0公式）的局部证据修复，但二者与UniAD的机制差异（流匹配vs.注意力、单阶段多模态生成vs.感知-预测-规划统一）从未被量化辨析，节点内六篇论文呈平行堆砌而非纵向推进，边际增益不可量化。
                - paragraph [ref=e154]: 产业落地关键约束被系统性回避，可部署性存疑：论文未讨论Query机制带来的推理延迟与NVIDIA Orin级芯片<100ms车规实时性要求的兼容性，未分析多任务联合建模导致的显存占用激增与训练不稳定性（如任务竞争导致的梯度发散），亦未提供与ISO 26262功能安全及SOTIF预期功能安全的对齐机制（如ODD边界划定、长尾场景调试策略、感知-预测-规划任一模块失效时的故障降级路径）。DynFlowDrive虽给出流损失函数数学表达式，但未明确流匹配多步积分（表5显示10步）与Orin级芯片实时性要求的兼容性；UniDriveDreamer的57张图未展示多模态融合拓扑，零公式使其跨模态对齐机制完全不可见。在零GPU小时数、batch size限制或模型参数量表的证据结构下，「最具影响力框架」的声称缺乏工程可信度，产业界关注的维护代价与供应链约束被完全忽略。
