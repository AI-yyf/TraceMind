<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="溯知 TraceMind：让研究成为一条可追踪、可沉淀的思想脉络。"
    />
    <title>溯知 TraceMind</title>
    <script>
      window.__globalSearchRequested = false;
      window.addEventListener(
        'keydown',
        function (event) {
          var key = (event.key || '').toLowerCase();
          if ((event.metaKey || event.ctrlKey) && key === 'k') {
            event.preventDefault();
            window.__globalSearchRequested = true;
            window.dispatchEvent(new Event('global-search-open'));
          }
        },
        true,
      );
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
