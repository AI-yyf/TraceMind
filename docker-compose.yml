version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tracemind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tracemind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracemind123}
      POSTGRES_DB: ${POSTGRES_DB:-tracemind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tracemind-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracemind} -d ${POSTGRES_DB:-tracemind}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tracemind-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - tracemind-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend API Server
  backend:
    build:
      context: ./skills-backend
      dockerfile: Dockerfile
    container_name: tracemind-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3303
      DATABASE_URL: postgresql://${POSTGRES_USER:-tracemind}:${POSTGRES_PASSWORD:-tracemind123}@postgres:5432/${POSTGRES_DB:-tracemind}
      REDIS_URL: redis://redis:6379
      # AI Provider API Keys (passed from .env or defaults)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-pro}
      LOCAL_BASE_URL: ${LOCAL_BASE_URL:-}
      LOCAL_MODEL: ${LOCAL_MODEL:-}
      S2_API_KEY: ${S2_API_KEY:-}
    volumes:
      - backend_uploads:/app/uploads
      - backend_pdfs:/app/pdfs
    networks:
      - tracemind-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3303/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend Web Server (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tracemind-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - tracemind-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_pdfs:
    driver: local

# Internal network for service communication
networks:
  tracemind-network:
    driver: bridge
